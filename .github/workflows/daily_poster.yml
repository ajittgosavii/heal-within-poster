name: Daily Reel Poster

on:
  schedule:
    # 9:00 AM Calgary MDT (UTC-6) = 15:00 UTC
    # Change the time here: https://crontab.guru
    - cron: '0 15 * * *'
  workflow_dispatch:   # Manual trigger from GitHub → Actions tab

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx supabase

      - name: Post scheduled reel to Instagram
        run: python post_scheduled.py
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:             ${{ secrets.SUPABASE_KEY }}
          INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:        ${{ secrets.INSTAGRAM_USER_ID }}
